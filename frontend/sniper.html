<!DOCTYPE html>
<html lang="zh">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>WhaleBell</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0A0A1A;color:#fff;min-height:100vh;padding-bottom:80px}
.header{background:linear-gradient(135deg,#1A0A2E,#2A0A4E);padding:20px 16px 24px;text-align:center}
.header h1{font-size:22px;background:linear-gradient(135deg,#FF6B9D,#FFD700);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .badge{display:inline-block;background:rgba(255,107,157,0.2);border:1px solid rgba(255,107,157,0.4);padding:4px 12px;border-radius:20px;font-size:11px;color:#FF6B9D;margin-top:8px}
.timer{font-size:36px;font-weight:800;color:#FFD700;margin:8px 0}
.quota{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#16162A;font-size:13px}
.quota .btn{background:linear-gradient(135deg,#FFD700,#FF8C00);color:#000;border:none;padding:6px 14px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer}
.tip{padding:12px 16px;font-size:12px;color:#8E8EA0;border-bottom:1px solid #2A2A45}
.tip strong{color:#FFD700}
.section{padding:12px 16px 0;font-size:16px;font-weight:700}
.cards{padding:8px 16px}
.card{background:#16162A;border:1px solid #2A2A45;border-radius:12px;padding:12px;margin-bottom:8px;display:flex;gap:10px}
.card .av{font-size:28px;width:40px;text-align:center}
.card .info{flex:1}
.card .name{font-weight:700;font-size:15px}
.card .name .lv{display:inline-block;background:linear-gradient(135deg,#FDCB6E,#E17055);color:#000;padding:1px 8px;border-radius:8px;font-size:10px;margin-left:6px}
.card .meta{font-size:11px;color:#8E8EA0;margin:2px 0}
.card .comment{font-size:12px;color:#aaa;font-style:italic;margin:6px 0}
.card .btns{display:flex;gap:6px}
.card .btn-copy{background:rgba(255,107,157,0.15);color:#FF6B9D;border:1px solid rgba(255,107,157,0.3);padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer}
.card .btn-tt{background:#FF6B9D;color:#fff;border:none;padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;text-decoration:none}
.bottom{position:fixed;bottom:0;left:0;right:0;background:#16162A;border-top:1px solid #2A2A45;padding:10px 16px;display:flex;gap:8px;z-index:10}
.bottom button{flex:1;padding:10px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer}
.bottom .invite{background:#16162A;color:#fff;border:1px solid #2A2A45}
.bottom .vip{background:linear-gradient(135deg,#FFD700,#FF8C00);color:#000;border:none}
.loading{text-align:center;padding:40px;color:#8E8EA0}
.loading .spin{display:inline-block;width:24px;height:24px;border:2px solid #2A2A45;border-top-color:#FF6B9D;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:100;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#1A1A2E;border-radius:16px;padding:20px;max-width:340px;width:90%;border:1px solid #2A2A45}
.modal h3{font-size:18px;margin-bottom:8px}
.modal .sub{font-size:12px;color:#8E8EA0;margin-bottom:16px}
.modal input,.modal select{width:100%;background:#0A0A1A;border:1px solid #2A2A45;color:#fff;padding:8px 10px;border-radius:8px;margin-bottom:8px;font-size:13px}
.modal .btn{width:100%;padding:12px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px}
.modal .btn-primary{background:#FF6B9D;color:#fff;border:none}
.modal .btn-gold{background:linear-gradient(135deg,#FFD700,#FF8C00);color:#000;border:none}
.modal .close{position:absolute;top:10px;right:10px;background:none;border:none;color:#fff;font-size:18px;cursor:pointer}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#FF6B9D;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;z-index:200}
</style></head>
<body>
<div class="header"><h1>🐋 WhaleBell</h1><div class="badge">🎯 化妆间狙击</div><div class="timer" id="timer">30:00</div><div style="font-size:12px;color:#8E8EA0">化妆准备时间</div></div>
<div class="quota"><span>🎯 今日剩余 <b id="quotaNum">5</b> 个名额</span><button class="btn" onclick="openPay()">💎 升级VIP</button></div>
<div class="tip">💡 点赞+评论大哥视频，开播后<strong>30%概率</strong>进你直播间</div>
<div class="section">🎯 今日狙击目标</div>
<div class="cards" id="list"><div class="loading"><div class="spin"></div><div>正在扫描大哥...</div></div></div>
<div class="bottom"><button class="invite">👯 邀请+2</button><button class="vip" onclick="openPay()">💎 升级VIP</button></div>

<div class="modal-overlay" id="payModal">
<div class="modal" style="position:relative"><button class="close" onclick="closePay()">✕</button><h3>💎 开通会员</h3><div class="sub">每天50个精准大哥</div>
<div style="display:flex;gap:8px;margin-bottom:12px"><div onclick="selPlan('weekly')" id="planW" style="flex:1;background:#16162A;border:2px solid #FF6B9D;border-radius:10px;padding:12px;text-align:center;cursor:pointer"><div style="font-size:22px;font-weight:800">29K</div><div style="font-size:11px;color:#8E8EA0">周卡</div></div><div onclick="selPlan('monthly')" id="planM" style="flex:1;background:#16162A;border:2px solid #2A2A45;border-radius:10px;padding:12px;text-align:center;cursor:pointer"><div style="font-size:22px;font-weight:800">79K</div><div style="font-size:11px;color:#8E8EA0">月卡</div></div></div>
<div id="payStep1"><button class="btn btn-primary" onclick="showPayStep2()">💳 选择支付方式</button></div>
<div id="payStep2" style="display:none"><div style="background:#0A0A1A;padding:10px;border-radius:8px;margin-bottom:10px;font-size:12px"><div style="color:#8E8EA0;margin-bottom:6px">📋 转账到以下账户：</div><div id="accts"></div></div>
<input placeholder="你的名字" id="payName"><select id="payMethod"><option value="">选择转账方式</option><option>GoPay</option><option>Dana</option><option>BCA</option></select>
<button class="btn btn-gold" onclick="submitPay()">✅ 我已转账，激活VIP</button></div>
<div id="payStep3" style="display:none;text-align:center"><div style="font-size:40px">🎉</div><h3>VIP激活成功!</h3><button class="btn btn-primary" onclick="closePay()">开始狙击!</button></div></div></div>

<script>
var API='/api', plan='weekly';
function selPlan(p){plan=p;document.getElementById('planW').style.borderColor=p==='weekly'?'#FF6B9D':'#2A2A45';document.getElementById('planM').style.borderColor=p==='monthly'?'#FF6B9D':'#2A2A45'}
function openPay(){document.getElementById('payModal').classList.add('show')}
function closePay(){document.getElementById('payModal').classList.remove('show');document.getElementById('payStep1').style.display='block';document.getElementById('payStep2').style.display='none'}
function showPayStep2(){document.getElementById('payStep1').style.display='none';document.getElementById('payStep2').style.display='block';loadAccts()}
function toast(m){var d=document.createElement('div');d.className='toast';d.textContent=m;document.body.appendChild(d);setTimeout(function(){d.remove()},2000)}
function copyText(t){navigator.clipboard.writeText(t).then(function(){toast('已复制')})}
function loadAccts(){fetch(API+'/pay/config').then(function(r){return r.json()}).then(function(d){var el=document.getElementById('accts');el.innerHTML='';if(d.accounts){var ks=Object.keys(d.accounts);for(var i=0;i<ks.length;i++){var a=d.accounts[ks[i]];var div=document.createElement('div');div.style.cssText='padding:6px 0;border-bottom:1px solid #2A2A45;display:flex;justify-content:space-between';div.innerHTML='<span>'+a.icon+' '+a.name+': '+a.number+'</span><span style=color:#FF6B9D;cursor:pointer>📋</span>';div.querySelector('span:last-child').onclick=(function(num){return function(){copyText(num)}})(a.number);el.appendChild(div)}}else{el.innerHTML='暂无收款账户'}}).catch(function(){})}
async function submitPay(){var n=document.getElementById('payName').value,m=document.getElementById('payMethod').value;if(!n)return toast('请输入名字');if(!m)return toast('请选择转账方式');try{var o=await(await fetch(API+'/pay/order',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:'u_'+Date.now(),plan:plan})})).json();await(await fetch(API+'/pay/upload',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({orderId:o.orderId,paymentMethod:m,senderName:n})})).json();document.getElementById('payStep2').style.display='none';document.getElementById('payStep3').style.display='block';try{await fetch(API+'/dist/premium/mock',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:'u_'+Date.now(),plan:plan})})}catch(e){}}catch(e){toast('网络错误')}}
async function loadWhales(){try{var r=await fetch(API+'/sniper/targets?lang=zh');var d=await r.json();if(d.success&&d.targets.length){var h='';var em={50:'👑',49:'💎',48:'💎',47:'💎',46:'🦁',45:'🦁',44:'🦁',43:'🦁',42:'🐯',41:'🐯',40:'🐯'};for(var i=0;i<d.targets.length;i++){var t=d.targets[i];var e=em[t.level]||'⭐';h+='<div class=card><div class=av>'+e+'</div><div class=info><div class=name>'+t.nickname+'<span class=lv>LV'+t.level+'</span></div><div class=meta>@'+t.username+' | '+(t.region||'')+' | '+t.templateType+'</div><div class=comment>\" '+t.comment.substring(0,70)+'...\"</div><div class=btns><button class=btn-copy id=cb'+i+'>📋 复制话术</button><a class=btn-tt href=https://www.tiktok.com/@'+t.username+' target=_blank>🔗 TikTok</a></div></div></div>'}document.getElementById('list').innerHTML=h;for(var j=0;j<d.targets.length;j++){(function(idx,t){document.getElementById('cb'+idx).onclick=function(){copyText(t.comment)}})(j,d.targets[j])}}}catch(e){document.getElementById('list').innerHTML='<div class=loading>😢 加载失败</div>'}}
var sec=1800;setInterval(function(){if(sec>0)sec--;var m=Math.floor(sec/60),s=sec%60;document.getElementById('timer').textContent=('0'+m).slice(-2)+':'+('0'+s).slice(-2)},1000);
loadWhales();
</script>
</body></html>
