<!DOCTYPE html>
<html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>WhaleBell 🐋</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0A0A1A;--card:#16162A;--pink:#FF6B9D;--gold:#FFD700;--purple:#7C5CFC;--text:#fff;--dim:#8E8EA0;--border:#2A2A45;--radius:14px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px}
.header{background:linear-gradient(135deg,#1A0A2E 0%,#2A0A4E 50%,#1A0A2E 100%);padding:20px 16px 24px;position:relative;overflow:hidden;text-align:center}
.header::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(124,92,252,0.1) 0%,transparent 60%);animation:rot 10s linear infinite}
@keyframes rot{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.header h1{font-size:22px;font-weight:800;background:linear-gradient(135deg,var(--pink),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;position:relative;z-index:1}
.header .badge{display:inline-block;background:rgba(255,107,157,0.2);border:1px solid rgba(255,107,157,0.4);padding:4px 14px;border-radius:20px;font-size:11px;color:var(--pink);margin:8px 0;position:relative;z-index:1}
.header .timer{font-size:42px;font-weight:800;color:var(--gold);position:relative;z-index:1;margin:6px 0}
.header .timer-sub{font-size:12px;color:var(--dim);position:relative;z-index:1}
.lang{display:flex;gap:4px;justify-content:center;margin-top:8px;position:relative;z-index:1}
.lang button{background:none;border:1px solid rgba(255,255,255,0.2);color:var(--dim);padding:2px 10px;border-radius:6px;font-size:10px;cursor:pointer}
.lang button.active{background:rgba(255,107,157,0.3);border-color:var(--pink);color:#fff}
.logout{position:absolute;top:12px;right:16px;z-index:2;background:rgba(255,255,255,0.08);border:none;color:var(--dim);padding:4px 12px;border-radius:6px;font-size:11px;cursor:pointer}
.stats{display:flex;padding:12px 16px;gap:0}
.stat{flex:1;text-align:center}
.stat .v{font-size:18px;font-weight:700}
.stat .l{font-size:10px;color:var(--dim);margin-top:2px}
.stat .v.gold{color:var(--gold)}
.tip{padding:10px 16px;font-size:11px;color:var(--dim);border-bottom:1px solid var(--border)}
.tip strong{color:var(--gold)}
.cats{padding:10px 16px 4px;display:flex;gap:6px;flex-wrap:wrap}
.cats button{background:var(--card);color:var(--dim);border:1px solid var(--border);padding:5px 12px;border-radius:16px;font-size:11px;cursor:pointer}
.cats button.active{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;border-color:transparent}
.section{padding:8px 16px;display:flex;justify-content:space-between;align-items:center}
.section h2{font-size:15px}
.section .refresh{background:none;border:none;color:var(--pink);font-size:18px;cursor:pointer;animation:none}
.section .refresh.loading{animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.cards{padding:4px 16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;position:relative}
.card .row{display:flex;align-items:flex-start;gap:10px}
.card .av{font-size:32px;min-width:44px;text-align:center;line-height:1}
.card .info{flex:1}
.card .name{font-weight:700;font-size:15px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.card .lv{display:inline-block;background:linear-gradient(135deg,#FDCB6E,#E17055);color:#000;padding:1px 8px;border-radius:8px;font-size:10px;font-weight:700}
.card .uname{font-size:11px;color:var(--dim);margin:2px 0}
.card .tags{display:flex;gap:4px;flex-wrap:wrap;margin:4px 0}
.card .tag{font-size:10px;padding:2px 6px;border-radius:4px;background:rgba(124,92,252,0.15);color:var(--purple)}
.card .tag.persona{background:rgba(0,230,118,0.15);color:#00E676}
.card .meta{font-size:11px;color:var(--dim);margin:2px 0;display:flex;gap:12px}
.card .comment{font-size:12px;color:#aaa;font-style:italic;margin:8px 0;padding:6px 10px;background:rgba(255,255,255,0.03);border-radius:6px;border-left:2px solid var(--border)}
.card .btns{display:flex;gap:6px;flex-wrap:wrap}
.card .btns button{flex:1;min-width:60px;padding:6px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-weight:500;border:none}
.card .btn-copy{background:rgba(255,107,157,0.12);color:var(--pink);border:1px solid rgba(255,107,157,0.25)!important}
.card .btn-tt{background:var(--pink);color:#fff;text-decoration:none;text-align:center;display:inline-flex;align-items:center;justify-content:center}
.card .btn-commented{background:rgba(0,230,118,0.12);color:#00E676;border:1px solid rgba(0,230,118,0.25)!important}
.card .btn-commented.done{background:rgba(0,230,118,0.3);color:#fff}
/* Feedback row */
.fb-row{display:flex;gap:4px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);flex-wrap:wrap}
.fb-btn{flex:1;padding:5px 8px;border-radius:6px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--dim);text-align:center;min-width:50px;transition:all .2s}
.fb-btn:hover{opacity:.8}
.fb-btn.up.active,.fb-btn.down.active{color:#fff;border-color:transparent}
.fb-btn.up.active{background:rgba(0,230,118,0.3);border-color:#00E676!important}
.fb-btn.down.active{background:rgba(255,68,68,0.3);border-color:#ff4444!important}
.fb-btn.response.active{background:rgba(124,92,252,0.3);border-color:var(--purple)!important}
.fb-btn.rev.active{background:rgba(255,215,0,0.3);border-color:var(--gold)!important}
.response-row{display:none;gap:4px;margin-top:6px;flex-wrap:wrap}
.response-row.show{display:flex}
.response-row .fb-btn{background:var(--card);border-color:var(--border);flex:0 0 auto;padding:4px 10px}
.rev-row{display:none;gap:4px;margin-top:6px;flex-wrap:wrap}
.rev-row.show{display:flex}
.rev-row .fb-btn{background:var(--card);border-color:var(--border);flex:0 0 auto;padding:4px 10px}
.bottom{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);padding:8px 16px 16px;display:flex;gap:6px;z-index:10}
.bottom button{flex:1;padding:10px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:linear-gradient(135deg,var(--gold),#FF8C00);color:#000;border:none}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--pink);color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;z-index:999}
.loading-page{text-align:center;padding:40px;color:var(--dim)}
.spin{display:inline-block;width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--pink);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:8px}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.75);z-index:100;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:var(--radius);padding:20px;max-width:340px;width:90%;border:1px solid var(--border);position:relative}
.modal h3{font-size:18px;margin-bottom:4px}
.modal .sub{font-size:12px;color:var(--dim);margin-bottom:16px}
.modal .btn{width:100%;padding:12px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px}
.modal .btn-pink{background:var(--pink);color:#fff;border:none}
.modal .close{position:absolute;top:10px;right:10px;background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer}
</style>
</head><body>
<div class="header"><button class="logout" onclick="logout()">退出</button><h1>🐋 WhaleBell</h1><div class="badge" id="badge">🎯 化妆间狙击</div><div class="timer" id="timer">30:00</div><div class="timer-sub" id="timerSub">化妆准备时间</div>

<div class="bottom"><button onclick="loadWhales()">🔄 <span id="refreshLabel">刷新</span></button></div>

copyDone:'✅ Disalin',fbUp:'👍 Berguna',fbDown:'👎 Tidak',response:'Respon',responseNone:'Tidak ada',responseLike:'Suka',responseFollow:'Follow',responseDm:'DM',responseEnter:'Masuk',revenue:'Pendapatan',rev0:'0',rev1k:'1-50K',rev2k:'50-200K',rev3k:'200K+',feedbackSent:'Feedback disimpan'}

所有品类:'Semua',超级VIP:'VIP',重量级:'Berat'}

function tr(region){return REG[L]?.[region]||region}
function tt(tag){return TT[L]?.[tag]||tag}

function setL(l){L=l;['zh','en','id'].forEach(function(x){var el=document.getElementById('l'+x);el.className=x===l?'active':''});applyL();if(window._targets)renderCards(window._targets)}
function applyL(){
document.getElementById('badge').textContent=t('badge');document.getElementById('timerSub').textContent=t('timerSub');
document.getElementById('lblTotal').textContent=t('total');document.getElementById('lblDone').textContent=t('done');document.getElementById('lblMax').textContent=t('max');
document.getElementById('tipText').textContent=t('tip');document.getElementById('secTitle').textContent=t('sec');document.getElementById('refreshLabel').textContent=t('refresh');updateCats();

function logout(){localStorage.clear();window.location.href='/index.html'}
function toast(m){var d=document.createElement('div');d.className='toast';d.textContent=m;document.body.appendChild(d);setTimeout(function(){d.remove()},2000)}
function copyText(tx){navigator.clipboard.writeText(tx).then(function(){toast('✅ '+t('copyDone'))})}

// Tracking helpers
function track(action,data){
  data.userId=_uid;
  fetch(API+'/track/'+action,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}).catch(function(){});

// Category filter
var CATS={zh:['全部','💃 热舞','✨ 颜值','🎤 唱歌','😂 搞笑','🎮 游戏','💬 聊天'],en:['All','💃 Dance','✨ Beauty','🎤 Singer','😂 Comedy','🎮 Games','💬 Chat'],id:['Semua','💃 Dansa','✨ Cantik','🎤 Nyanyi','😂 Lucu','🎮 Game','💬 Obrolan']};
function updateCats(){var labels=CATS[L]||CATS.en;for(var i=0;i<7;i++){var btn=document.getElementById('catBtn'+i);if(btn)btn.textContent=labels[i]}}
function filterRegion(r){reg=r;document.querySelectorAll('#regionCats button').forEach(function(b,i){b.className=i===0&&!r?'active':b.textContent.includes(r)?'active':''});loadWhales()}
function filterCat(c){cat=c;document.querySelectorAll('#cats button').forEach(function(b){var dc=b.getAttribute('data-cat')||'';b.className=dc===c?'active':''});document.querySelectorAll('#regionCats button').forEach(function(b){b.className=reg&&b.textContent.includes(reg)?'active':''});loadWhales()}

// Track login on page load
track('login',{});

// Load whales

// Daily rotation - track shown whales
function getShownToday() {
  try {
    var data = JSON.parse(localStorage.getItem('wb_shown') || '{}');
    var today = new Date().toDateString();
    if (data.date !== today) return { date: today, ids: [] };
    return data;
  } catch(e) { return { date: new Date().toDateString(), ids: [] }; }
}
function markShown(ids) {
  var data = getShownToday();
  for (var i = 0; i < ids.length; i++) {
    if (data.ids.indexOf(ids[i]) < 0) data.ids.push(ids[i]);
  }
  localStorage.setItem('wb_shown', JSON.stringify(data));
}
function filterShown(targets) {
  var shown = getShownToday().ids;
  var fresh = targets.filter(function(t) { return shown.indexOf(t.id) < 0; });
  if (fresh.length < 5) {
    localStorage.setItem('wb_shown', JSON.stringify({ date: new Date().toDateString(), ids: [] }));
    return targets;
  }
  return fresh;
}


// Tracking functions — report to analytics API
function track(evt, whaleId, data) {
  var body = { userId: localStorage.getItem('wb_user') ? JSON.parse(localStorage.getItem('wb_user')).id : 'anon', whaleId: whaleId };
  if (data) Object.assign(body, data);
  fetch(API + '/track/' + evt, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }).catch(function(){});
}
function markCommented(whaleId, btn) {
  btn.textContent = '✅ 已评论'; btn.style.background = 'rgba(0,230,118,0.25)';
  track('commented', whaleId);
}
function voteFeedback(whaleId, vote, btn) {
  btn.textContent = vote === 'up' ? '👍 已投' : '👎 已投';
  var other = btn.parentElement.querySelector('.btn-vote' + (vote === 'up' ? '.down' : '.up'));
  if (other) { other.textContent = vote === 'up' ? '👎' : '👍'; other.style.opacity = '0.4'; }
  btn.style.opacity = '1'; btn.style.background = 'rgba(255,107,157,0.25)';
  track('feedback', whaleId, { vote: vote });
}
function showResponseModal(whaleId) {
  var r = confirm('大哥有没有回应？\n确定 = 进直播间了\n取消 = 还没回应');
  if (r) { track('response', whaleId, { type: 'enter_room' }); toast('✅ 已记录!'); }
  else { track('response', whaleId, { type: 'no_response' }); }
}
function showRevenueModal(whaleId) {
  var r = prompt('大哥刷了多少IDR？\n0 / 1-50000 / 50000-200000 / 200000+', '0');
  if (r !== null) { track('revenue', whaleId, { range: r }); toast('💰 已记录!'); }
}

async function loadWhales(){
var btn=document.getElementById('refreshBtn');btn.classList.add('loading');
try{
var url=API+'/sniper/targets?lang='+L+'&limit=30';
if(cat)url+='&category='+cat;
if(reg)url+='&region='+encodeURIComponent(reg);
url+='&_='+Date.now();var r=await fetch(url);var d=await r.json();
if(d.success&&d.targets.length){var fresh=filterShown(d.targets);window._targets=fresh;renderCards(fresh);markShown(fresh.map(function(t){return t.id}));
var mx=0;for(var i=0;i<d.targets.length;i++){if(d.targets[i].level>mx)mx=d.targets[i].level}
document.getElementById('statTotal').textContent=d.targets.length;document.getElementById('statMax').textContent='LV'+mx;document.getElementById('statDone').textContent=Object.keys(commented).length}
}catch(e){document.getElementById('list').innerHTML='<div class=loading-page>😢 '+e.message+'</div>'}
btn.classList.remove('loading');
  // Track view
  if (d.targets && d.targets.length > 0) {
    var uid = localStorage.getItem('wb_user');
    if (uid) uid = JSON.parse(uid).id;
    fetch(API + '/track/view', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId: uid || 'anon', whaleId: d.targets[0].id || 'list' }) }).catch(function(){});
  }
}

function toggleCommented(id){
if(commented[id]){delete commented[id]}else{commented[id]=true;track('commented',{whaleId:id})}
document.getElementById('statDone').textContent=Object.keys(commented).length;renderCards(window._targets||[])
}

function setFeedback(id,vote){
var key=id+'_fb';
if(feedback[key]===vote){delete feedback[key]}else{feedback[key]=vote;track('feedback',{whaleId:id,vote:vote})}
renderCards(window._targets||[])
}

function setResponse(id,type){
var key=id+'_resp';
if(responses[key]===type){delete responses[key]}else{responses[key]=type;track('response',{whaleId:id,type:type})}
renderCards(window._targets||[])
}

function setRevenue(id,range){
var key=id+'_rev';
if(revenues[key]===range){delete revenues[key]}else{revenues[key]=range;track('revenue',{whaleId:id,range:range})}
renderCards(window._targets||[])
}

function renderCards(targets){
var h='';var em={50:'👑',49:'💎',48:'💎',47:'💎',46:'🦁',45:'🦁',44:'🦁',43:'🦁',42:'🐯',41:'🐯',40:'🐯'};
for(var i=0;i<targets.length;i++){
var w=targets[i],e=em[w.level]||'⭐';
var name=w.nickname||w.username||'?',region=w.region||'',tp=w.templateType||'';
var tags=(w.tags||[]).slice(0,3),coins=w.totalCoins||0;
var isCommented=!!commented[w.id];
var fbKey=w.id+'_fb',fbVal=feedback[fbKey]||'';
var respKey=w.id+'_resp',respVal=responses[respKey]||'';
var revKey=w.id+'_rev',revVal=revenues[revKey]||'';
var respOpen=respVal?' show':'';
var revOpen=revVal?' show':'';

h+='<div class="card"><div class="row"><div class="av">'+e+'</div><div class="info"><div class="name">'+name+'<span class="lv">LV'+w.level+'</span></div><div class="uname">@'+w.username+'</div><div class="tags">'+tags.map(function(tg){return '<span class="tag">'+tt(tg)+'</span>'}).join('')+(w.persona?'<span class="tag persona">'+tt(w.persona)+'</span>':'')+'<span class="tag" style="background:rgba(255,215,0,0.12);color:#FFD700">'+tp+'</span></div><div class="meta"><span>📍 '+region+'</span><span>💰 '+(coins>0?(coins>=1000?(coins/1000).toFixed(1)+'K':coins):'N/A')+'</span><span>🟢 Online</span></div><div class="comment">" '+(w.comment||'').substring(0,80)+'...\"</div>';

// Action buttons row
h+='<div class="btns">';
h+='<button class="btn-copy" id="cb'+i+'" onclick="doCopy('+i+')">📋 '+t('copy')+'</button>';
h+='<a class="btn-tt" onclick="openTT(this)" data-user="'+w.username+'" href="#">📱 '+t('tt')+'</a>';
h+='<button class="btn-commented'+(isCommented?' done':'')+'" id="cm'+i+'" onclick="toggleCommented('+w.id+')">'+(isCommented?'✅ '+t('doneLabel'):'💬 '+t('commented'))+'</button>';
h+='</div>';

// Feedback row: 👍👎
h+='<div class="fb-row">';
h+='<button class="fb-btn up'+(fbVal==='up'?' active':'')+'" onclick="setFeedback('+w.id+',\'up\')">'+t('fbUp')+'</button>';
h+='<button class="fb-btn down'+(fbVal==='down'?' active':'')+'" onclick="setFeedback('+w.id+',\'down\')">'+t('fbDown')+'</button>';

// Response (关注回流)
h+='<button class="fb-btn response'+(respVal?' active':'')+'" onclick="toggleResp('+w.id+')">'+t('response')+'</button>';
// Revenue (流水反馈)
h+='<button class="fb-btn rev'+(revVal?' active':'')+'" onclick="toggleRev('+w.id+')">'+t('revenue')+'</button>';
h+='</div>';

// Response options row
h+='<div class="response-row'+respOpen+'" id="respRow'+w.id+'">';
var respOpts=['no_response','like','follow_back','dm','enter_room'];
var respLabels=[t('responseNone'),t('responseLike'),t('responseFollow'),t('responseDm'),t('responseEnter')];
for(var ri=0;ri<respOpts.length;ri++){
h+='<button class="fb-btn response'+(respVal===respOpts[ri]?' active':'')+'" onclick="setResponse('+w.id+',\''+respOpts[ri]+'\')">'+respLabels[ri]+'</button>';
}
h+='</div>';

// Revenue options row
h+='<div class="rev-row'+revOpen+'" id="revRow'+w.id+'">';
var revOpts=['0','1-50K','50-200K','200K+'];
var revLabels=[t('rev0'),t('rev1k'),t('rev2k'),t('rev3k')];
for(var ri=0;ri<revOpts.length;ri++){
h+='<button class="fb-btn rev'+(revVal===revOpts[ri]?' active':'')+'" onclick="setRevenue('+w.id+',\''+revOpts[ri]+'\')">'+revLabels[ri]+'</button>';
}
h+='</div>';

h+='</div></div></div>';
}
document.getElementById('list').innerHTML=h||'<div class=loading-page>😢 暂无数据</div>';

// Bind copy handlers
for(var j=0;j<targets.length;j++){(function(idx,t){
var card=document.getElementById('list').children[idx];if(card){
var btns=card.querySelectorAll('button');btns.forEach(function(b){
if(b.textContent.indexOf('已评论')>=0)b.onclick=function(){markCommented(t.id,b)};
if(b.textContent.indexOf('有用')>=0)b.onclick=function(){voteFeedback(t.id,'up',b)};
if(b.textContent.indexOf('没用')>=0)b.onclick=function(){voteFeedback(t.id,'down',b)};
if(b.textContent.indexOf('关注回流')>=0)b.onclick=function(){showResponseModal(t.id)};
if(b.textContent.indexOf('今日流水')>=0)b.onclick=function(){showRevenueModal(t.id)};
});}
var btn=document.getElementById('cb'+idx);if(btn)btn._whale=t})(j,targets[j])}
}

function doCopy(idx){
var t=window._targets[idx];
if(!t)return;
copyText(t.comment||'');
track('copy',{whaleId:t.id,script:(t.comment||'').substring(0,100)});
}

function toggleResp(id){
var el=document.getElementById('respRow'+id);
if(el)el.classList.toggle('show');
if(!el.classList.contains('show')){
var key=id+'_resp';
if(responses[key]){delete responses[key]}
renderCards(window._targets||[])
}
}

function toggleRev(id){
var el=document.getElementById('revRow'+id);
if(el)el.classList.toggle('show');
if(!el.classList.contains('show')){
var key=id+'_rev';
if(revenues[key]){delete revenues[key]}
renderCards(window._targets||[])
}
}

function openTT(el){var u=el.getAttribute('data-user');window.open('tiktok://user/'+u,'_self');setTimeout(function(){window.open('https://www.tiktok.com/@'+u,'_blank')},800)}

// Timer
var sec=1800;setInterval(function(){if(sec>0)sec--;var m=Math.floor(sec/60),s=sec%60;document.getElementById('timer').textContent=('0'+m).slice(-2)+':'+('0'+s).slice(-2)},1000);

applyL();loadWhales();
// deploy
</script>

</body></html>
