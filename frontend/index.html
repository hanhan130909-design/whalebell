<!DOCTYPE html>
<html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>WhaleBell 登录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#0A0A1A;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh}
.box{width:320px;padding:24px}
h1{font-size:28px;text-align:center;margin-bottom:4px;background:linear-gradient(135deg,#FF6B9D,#FFD700);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{text-align:center;color:#8E8EA0;font-size:13px;margin-bottom:24px}
input{width:100%;background:#16162A;border:1px solid #2A2A45;color:#fff;padding:10px 12px;border-radius:8px;margin-bottom:10px;font-size:14px}
button{width:100%;padding:12px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;border:none}
.btn-login{background:linear-gradient(135deg,#FF6B9D,#7C5CFC);color:#fff;margin-top:8px}
.toggle{text-align:center;margin-top:12px;font-size:12px;color:#8E8EA0}
.toggle a{color:#FF6B9D;cursor:pointer}
.error{background:rgba(255,0,0,0.15);color:#ff6b6b;padding:8px;border-radius:6px;font-size:12px;margin-bottom:10px;display:none}
</style></head><body>
<div class="box">
<h1>🐋 WhaleBell</h1>
<div class="sub">开播前狙击大哥，锁定你的流水</div>
<div class="error" id="err"></div>
<input id="email" type="email" placeholder="邮箱">
<input id="name" placeholder="昵称" style="display:none">
<input id="pass" type="password" placeholder="密码">
<button class="btn-login" id="btn" onclick="submit()">登录</button>
<div class="toggle"><span id="toggleText">还没有账号？</span> <a id="toggleBtn" onclick="toggle()">注册</a></div>
</div>
<script>
var isLogin=true,API='/api';
function toggle(){isLogin=!isLogin;document.getElementById('name').style.display=isLogin?'none':'block';document.getElementById('btn').textContent=isLogin?'登录':'注册';document.getElementById('toggleText').textContent=isLogin?'还没有账号？':'已有账号？';document.getElementById('toggleBtn').textContent=isLogin?'注册':'登录';document.getElementById('err').style.display='none'}
async function submit(){
  var e=document.getElementById('email').value,p=document.getElementById('pass').value,n=document.getElementById('name').value;
  if(!e||!p)return showErr('请填写邮箱和密码');
  try{
    var u=isLogin?API+'/auth/login':API+'/auth/register';
    var body=isLogin?{email:e,password:p}:{email:e,password:p,displayName:n||e.split('@')[0]};
    var r=await fetch(u,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    var d=await r.json();
    if(d.session){localStorage.setItem('wb_token',d.session.access_token);localStorage.setItem('wb_user',JSON.stringify(d.user));window.location.href='/sniper.html'}
    else showErr(d.error||'登录失败')
  }catch(x){showErr('网络错误')}
}
function showErr(m){var el=document.getElementById('err');el.textContent=m;el.style.display='block'}
</script>
</body></html>
