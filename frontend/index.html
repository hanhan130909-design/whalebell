<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WhaleBell 鲸铃 — 主播助手</title>
  <link rel="stylesheet" href="styles/main.css">
  <style>
    .auth-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .auth-logo {
      font-size: 64px;
      margin-bottom: 8px;
    }
    .auth-title {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 4px;
      background: linear-gradient(135deg, #6C5CE7, #FD79A8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .auth-desc {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 32px;
      text-align: center;
    }
    .auth-form {
      width: 100%;
      max-width: 320px;
    }
    .auth-form .btn {
      width: 100%;
      margin-top: 8px;
    }
    .auth-links {
      margin-top: 16px;
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
    }
    .auth-links a {
      color: var(--primary);
      cursor: pointer;
      text-decoration: none;
    }
    .auth-links a:hover {
      text-decoration: underline;
    }
    .auth-error {
      background: rgba(225, 112, 85, 0.15);
      color: var(--danger);
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      margin-bottom: 12px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-logo">🐋</div>
    <div class="auth-title">WhaleBell</div>
    <div class="auth-desc">高等级观众实时提醒 · 不错过任何一位大哥</div>
    
    <div class="auth-error" id="authError"></div>
    
    <form class="auth-form" id="authForm">
      <div class="form-group">
        <label>邮箱</label>
        <input type="email" class="form-input" id="email" placeholder="your@email.com" required>
      </div>
      <div class="form-group" id="nameGroup" style="display:none;">
        <label>昵称</label>
        <input type="text" class="form-input" id="displayName" placeholder="主播名称">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" class="form-input" id="password" placeholder="至少6位密码" minlength="6" required>
      </div>
      <button type="submit" class="btn btn-primary" id="authBtn">登录</button>
    </form>
    
    <div class="auth-links">
      <span id="authToggleText">还没有账号？</span>
      <a id="authToggleBtn">注册</a>
    </div>
  </div>

  <script>
    let isLogin = true;
    const API = window.location.origin + '/api';

    function showError(msg) {
      const el = document.getElementById('authError');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function hideError() {
      document.getElementById('authError').style.display = 'none';
    }

    document.getElementById('authToggleBtn').addEventListener('click', () => {
      isLogin = !isLogin;
      document.getElementById('authBtn').textContent = isLogin ? '登录' : '注册';
      document.getElementById('authToggleText').textContent = isLogin ? '还没有账号？' : '已有账号？';
      document.getElementById('authToggleBtn').textContent = isLogin ? '注册' : '登录';
      document.getElementById('nameGroup').style.display = isLogin ? 'none' : 'block';
      hideError();
    });

    document.getElementById('authForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const displayName = document.getElementById('displayName').value;
      const btn = document.getElementById('authBtn');
      
      btn.disabled = true;
      btn.textContent = '处理中...';
      
      try {
        const endpoint = isLogin ? '/auth/login' : '/auth/register';
        const body = { email, password };
        if (!isLogin) body.displayName = displayName || email.split('@')[0];
        
        const res = await fetch(API + endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        
        const data = await res.json();
        
        if (!res.ok) {
          showError(data.error || data.msg || '操作失败 (' + res.status + ')');
          btn.disabled = false;
          btn.textContent = isLogin ? '登录' : '注册';
          return;
        }
        
        // Save session - handle both admin API (no session) and regular auth
        const userData = data.session || data.user;
        if (data.session) {
          localStorage.setItem('whalebell_session', JSON.stringify(data.session));
          localStorage.setItem('whalebell_user', JSON.stringify(data.user));
        } else if (data.user) {
          // Admin API mode - store user info directly
          localStorage.setItem('whalebell_session', JSON.stringify({
            access_token: 'admin',
            user: data.user
          }));
          localStorage.setItem('whalebell_user', JSON.stringify(data.user));
        }
        
        // Redirect to dashboard
        window.location.href = '/dashboard.html';
        
      } catch (err) {
        showError('网络错误，请重试');
        btn.disabled = false;
        btn.textContent = isLogin ? '登录' : '注册';
      }
    });

    // Check if already logged in (with better error handling)
    (async () => {
      try {
        const session = localStorage.getItem('whalebell_session');
        if (!session) return;
        
        // Validate session format
        const parsed = JSON.parse(session);
        if (!parsed.access_token) {
          localStorage.removeItem('whalebell_session');
          localStorage.removeItem('whalebell_user');
          return;
        }
        
        // Check if session is still valid
        const res = await fetch(API + '/profile', {
          headers: { 'x-user-id': parsed.user?.id || '' }
        });
        if (res.ok) {
          window.location.href = '/dashboard.html';
        } else {
          // Session expired, clear it
          localStorage.removeItem('whalebell_session');
          localStorage.removeItem('whalebell_user');
        }
      } catch (e) {
        // Network error or invalid data, clear stale session
        localStorage.removeItem('whalebell_session');
        localStorage.removeItem('whalebell_user');
      }
    })();
  </script>
</body>
</html>
